    <style>
      #initial-loader {
        position: fixed; inset: 0; background: #0a0a0a;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.5s ease;
      }
      .loader-logo { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: #d4af37; margin-bottom: 2rem; letter-spacing: 2px; }
      .loader-bar { width: 120px; height: 1px; background: rgba(212, 175, 55, 0.2); position: relative; overflow: hidden; }
      .loader-bar::after {
        content: ''; position: absolute; left: -100%; width: 100%; height: 100%;
        background: #d4af37; animation: loading 1.5s infinite ease-in-out;
      }
      @keyframes loading { 0% { left: -100%; } 50% { left: 0%; } 100% { left: 100%; } }
    </style>
    <title>Eagle Entertainment | Premium Event Management Coimbatore</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="initial-loader">
        <div class="loader-logo">EAGLE</div>
        <div class="loader-bar"></div>
      </div>
    </div>
  </body>
</html>
