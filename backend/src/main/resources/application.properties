# Active Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=8080

# Database - Using H2 for development (switch to MySQL for production)
spring.datasource.url=jdbc:h2:mem:eagledb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# JWT
app.jwt.secret=${JWT_SECRET:EagleEntertainmentSuperSecretKeyForJWTTokenGeneration2024LocalDevOnly}
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

